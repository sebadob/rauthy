apiVersion: v1
kind: Pod
metadata:
  name: {{ include "rauthy.fullname" . }}-test-connection
  labels:
    {{- include "rauthy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health
      image: curlimages/curl:8.11.0
      command: ["curl"]
      args:
        - "--fail"
        - "--silent"
        - "--show-error"
        - "http://{{ include "rauthy.fullname" . }}:{{ .Values.service.port }}/auth/v1/health"
