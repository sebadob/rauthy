{{- if not .Values.config.existingSecret -}}
{{- if not .Values.config.content -}}
{{- fail "\n\nrauthy: no configuration provided.\nSet either:\n  - config.existingSecret  (recommended) a Secret holding your config.toml, or\n  - config.content         the full config.toml inline (the chart creates the Secret).\nSee values.yaml and files/config.toml.example.\n" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rauthy.configSecretName" . }}
  labels:
    {{- include "rauthy.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.existingSecretKey }}: |
{{ .Values.config.content | indent 4 }}
{{- end }}
